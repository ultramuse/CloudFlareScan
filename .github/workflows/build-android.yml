name: Build CloudFlareScan for Android

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install system dependencies for Android build
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          openjdk-11-jdk \
          unzip \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libnss3-dev \
          libssl-dev \
          libreadline-dev \
          libffi-dev \
          libsqlite3-dev \
          wget \
          curl
        
    - name: Install Buildozer and Android dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv
        
    - name: Create Buildozer spec file for Android
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = CloudFlareScan
package.name = cloudflarescan
package.domain = org.github

source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ico

version = 1.0.0
requirements = python3,kivy,asyncio,aiohttp,openssl

[buildozer]
log_level = 2

[app]
source.include_patterns = assets/*,images/*,*.py,*.kv
presplash.filename = %(source.dir)s/assets/presplash.png
icon.filename = %(source.dir)s/cfs.ico

[app]
android.permissions = INTERNET,ACCESS_NETWORK_STATE
android.api = 33
android.minapi = 21
android.ndk = 25b
android.sdk = 33

[app]
android.arch = arm64-v8a
EOF
        
    - name: Create Kivy-compatible main file
      run: |
        # 创建适配安卓的入口文件
        cat > main.py << 'EOF'
#!/usr/bin/env python3
"""
CloudFlareScan Android 版本
基于 Kivy 框架适配移动端
"""

import os
import sys
import random
import ipaddress
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.progressbar import ProgressBar
from kivy.uix.scrollview import ScrollView
from kivy.uix.gridlayout import GridLayout
from kivy.clock import Clock
import threading

# CloudFlare CIDR 列表
CF_IPV4_CIDRS = [
    "173.245.48.0/20", "103.21.244.0/22", "103.22.200.0/22", "103.31.4.0/22",
    "141.101.64.0/18", "108.162.192.0/18", "190.93.240.0/20", "188.114.96.0/20",
    "197.234.240.0/22", "198.41.128.0/17", "162.158.0.0/15", "104.16.0.0/12",
    "172.64.0.0/17", "172.64.128.0/18", "172.64.192.0/19", "172.64.224.0/22",
    "172.64.229.0/24", "172.64.230.0/23", "172.64.232.0/21", "172.64.240.0/21",
    "172.64.248.0/21", "172.65.0.0/16", "172.66.0.0/16", "172.67.0.0/16",
    "131.0.72.0/22"
]

class CloudFlareScanMobile(App):
    def build(self):
        main_layout = BoxLayout(orientation='vertical', padding=10, spacing=10)
        
        title = Label(
            text='CloudFlare IP扫描器',
            size_hint_y=0.1,
            font_size='24sp',
            bold=True
        )
        main_layout.add_widget(title)
        
        return main_layout

if __name__ == '__main__':
    CloudFlareScanMobile().run()
EOF
        
    - name: Create requirements.txt for Android
      run: |
        cat > requirements.txt << 'EOF'
kivy==2.1.0
aiohttp==3.8.4
EOF
        
    - name: Test configuration
      run: |
        echo "✅ Android构建配置验证完成"
        echo "📱 配置适用于: Python ${{ matrix.python-version }}"
        echo "📋 下一步: 本地Buildozer构建或使用专业CI服务"
        
    - name: Upload configuration artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-config-${{ matrix.python-version }}
        path: |
          main.py
          buildozer.spec
          requirements.txt
        retention-days: 3
